name: Selenium CI with Allure and Teams

on:
  push:
    branches:
      - "**"

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Cache Maven dependencies
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # 3️⃣ Set up Java 17
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # 4️⃣ Optional: List test files for debug
      - name: List test files
        run: ls -R src/test/java

      # 5️⃣ Build & Run Tests (continue even if failures occur)
      - name: Build and run tests
        run: mvn clean test -Dsurefire.suiteXmlFiles=testng.xml
        continue-on-error: true

      # 6️⃣ Install Allure CLI (direct download, works on Ubuntu 24.04)
      - name: Install Allure CLI
        run: |
          ALLURE_VERSION=2.27.0
          wget https://github.com/allure-framework/allure2/releases/download/$ALLURE_VERSION/allure-$ALLURE_VERSION.tgz
          tar -zxvf allure-$ALLURE_VERSION.tgz -C /opt/
          echo "/opt/allure-$ALLURE_VERSION/bin" >> $GITHUB_PATH

      # 7️⃣ Verify Allure installation
      - name: Check Allure version
        run: allure --version

      # 8️⃣ Generate Allure Report S
      - name: Generate Allure Report
        run: |
          if [ -d "test/allure-results" ] && [ "$(ls -A test/allure-results 2>/dev/null)" ]; then
          allure generate test/allure-results --clean -o allure-report
          else
          echo "No allure results found, creating placeholder report."
          mkdir -p allure-report
          echo "<html><body><h1>No tests executed</h1></body></html>" > allure-report/index.html
          fi

      # 9️⃣ Upload Allure Report Artifact
      - name: Upload Allure Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Allure-Report
          path: allure-report

      # 🔟 Parse test results (summing properly to avoid Bash errors)
      - name: Parse test results
        id: results
        run: |
          TOTAL=$(grep -c "<testcase" target/surefire-reports/*.xml 2>/dev/null | awk '{s+=$1} END {print s+0}')
          FAILED=$(grep -c "<failure" target/surefire-reports/*.xml 2>/dev/null | awk '{s+=$1} END {print s+0}')
          SKIPPED=$(grep -c "<skipped" target/surefire-reports/*.xml 2>/dev/null | awk '{s+=$1} END {print s+0}')
          PASSED=$((TOTAL - FAILED - SKIPPED))
          FAILED_TESTS=$(grep "<testcase" target/surefire-reports/*.xml 2>/dev/null | grep "<failure" | sed 's/.*classname="\([^"]*\)".*/\1/' | tr '\n' ', ' || echo "None")

          echo "TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "PASSED=$PASSED" >> $GITHUB_ENV
          echo "FAILED=$FAILED" >> $GITHUB_ENV
          echo "SKIPPED=$SKIPPED" >> $GITHUB_ENV
          echo "FAILED_TESTS=$FAILED_TESTS" >> $GITHUB_ENV

      # 1️⃣1️⃣ Debug test results
      - name: Debug test results
        run: |
          echo "Total: $TOTAL"
          echo "Passed: $PASSED"
          echo "Failed: $FAILED"
          echo "Skipped: $SKIPPED"
          echo "Failed Tests: $FAILED_TESTS"

      # 1️⃣2️⃣ Send Teams Notification
      - name: Send Teams Notification
        if: always()
        run: |
          curl -H 'Content-Type: application/json' -d "{
            \"title\": \"GitHub Actions Test Results\",
            \"text\": \"**Total:** $TOTAL\n**Passed:** $PASSED\n**Failed:** $FAILED\n**Skipped:** $SKIPPED\n**Failed Tests:** $FAILED_TESTS\n**Allure Report:** [Download Report]($GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)\"
          }" $TEAMS_WEBHOOK_URL
