name: Carrier Guard CI/CD

on:
  push:
    branches:
      - "**"
  repository_dispatch:
    types: [frontend_push]

permissions:
  contents: write

jobs:
  carrier-guard:
    runs-on: ubuntu-latest
    env:
      TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # needed to create/delete releases

    steps:
      # 1ÔłŹ‚É£ Checkout Source Code
      - name: Checkout Source Code
        uses: actions/checkout@v3

      # 2ÔłŹ‚É£ Set Up Java 17
      - name: Set Up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # 3ÔłŹ‚É£ Build Project & Run Tests
      - name: Build Project & Run Tests
        run: |
          set -o pipefail
          mvn clean test -Dsurefire.suiteXmlFiles=testng.xml 2>&1 | tee mvn-output.log

      # 4ÔłŹ‚É£ Install Allure CLI
      - name: Install Allure CLI
        run: |
          ALLURE_VERSION=2.27.0
          wget -q https://github.com/allure-framework/allure2/releases/download/$ALLURE_VERSION/allure-$ALLURE_VERSION.tgz
          tar -zxvf allure-$ALLURE_VERSION.tgz -C /opt/
          echo "/opt/allure-$ALLURE_VERSION/bin" >> $GITHUB_PATH

      # 5ÔłŹ‚É£ Generate Single-File Allure Report
      - name: Generate Allure Single-File Report
        run: |
          if [ -d "allure-results" ]; then
            allure generate allure-results --clean --single-file -o allure-report.zip
          else
            echo "No tests executed, creating empty report"
            echo "<html><body><h1>No tests executed</h1></body></html>" > index.html
            zip -r allure-report.zip index.html
          fi

      # 6ÔłŹ‚É£ Create GitHub Release for Allure Report
      - name: Create Release with Allure Report
        id: create_release
        run: |
          TAG="run-${GITHUB_RUN_ID}"
          RELEASE_RESPONSE=$(curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"$TAG\",\"name\":\"Allure Report $GITHUB_RUN_ID\",\"draft\":false,\"prerelease\":false}" \
            https://api.github.com/repos/${GITHUB_REPOSITORY}/releases)
          
          RELEASE_ID=$(echo "$RELEASE_RESPONSE" | jq -r '.id')
          echo "RELEASE_ID=$RELEASE_ID" >> $GITHUB_ENV

          # Upload artifact to release
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/zip" \
            --data-binary @allure-report.zip \
            "https://uploads.github.com/repos/${GITHUB_REPOSITORY}/releases/$RELEASE_ID/assets?name=allure-report-${GITHUB_RUN_ID}.zip"

      # 7ÔłŹ‚É£ Parse Test Summary from Maven output
      - name: Parse Test Summary
        id: results
        run: |
          TOTAL=0
          FAILED=0
          SKIPPED=0
          PASSED=0

          if [ -f mvn-output.log ]; then
            SUMMARY=$(grep "Tests run:" mvn-output.log | tail -n 1 || true)
            if [ -n "$SUMMARY" ]; then
              TOTAL=$(echo "$SUMMARY" | sed -n 's/.*Tests run: *\([0-9]*\).*/\1/p')
              FAIL=$(echo "$SUMMARY" | sed -n 's/.*Failures: *\([0-9]*\).*/\1/p')
              ERR=$(echo "$SUMMARY" | sed -n 's/.*Errors: *\([0-9]*\).*/\1/p')
              SKIPPED=$(echo "$SUMMARY" | sed -n 's/.*Skipped: *\([0-9]*\).*/\1/p')

              FAIL=${FAIL:-0}
              ERR=${ERR:-0}
              TOTAL=${TOTAL:-0}
              SKIPPED=${SKIPPED:-0}

              FAILED=$((FAIL + ERR))
              PASSED=$((TOTAL - FAILED - SKIPPED))
            fi
          fi

          echo "TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "PASSED=$PASSED" >> $GITHUB_ENV
          echo "FAILED=$FAILED" >> $GITHUB_ENV
          echo "SKIPPED=$SKIPPED" >> $GITHUB_ENV

      # 8ÔłŹ‚É£ Send Microsoft Teams Notification
      - name: Send Teams Notification
        if: always()
        run: |
          TOTAL=${TOTAL:-0}
          PASSED=${PASSED:-0}
          FAILED=${FAILED:-0}
          SKIPPED=${SKIPPED:-0}
          RELEASE_ID=${RELEASE_ID:-0}

          DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/run-${GITHUB_RUN_ID}/allure-report-${GITHUB_RUN_ID}.zip"

          TEXT="**Carrier Guard CI/CD Test Results**\n\n**Total:** ${TOTAL}\n**Passed:** ${PASSED}\n**Failed:** ${FAILED}\n**Skipped:** ${SKIPPED}\n\n**Allure Report (7-day retention):** [Download](${DOWNLOAD_URL})"

          JSON_PAYLOAD=$(printf '{"title":"Carrier Guard Automation","text":"%s"}' "${TEXT}")

          if [ -z "$TEAMS_WEBHOOK_URL" ]; then
            echo "TEAMS_WEBHOOK_URL not set, skipping notification"
            exit 0
          fi

          echo "Sending Teams notification..."
          curl -H 'Content-Type: application/json' -d "$JSON_PAYLOAD" "$TEAMS_WEBHOOK_URL"

      # 9ÔłŹ‚É£ Delete Old Releases (7 Days Retention)
      - name: Delete Old Releases
        run: |
          CURRENT_TIME=$(date +%s)
          SEVEN_DAYS=$((7*24*60*60))

          RELEASES=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases")

          echo "$RELEASES" | jq -r '.[] | "\(.id) \(.created_at)"' | while read ID CREATED_AT; do
            RELEASE_TIME=$(date -d "$CREATED_AT" +%s)
            AGE=$((CURRENT_TIME - RELEASE_TIME))

            if [ "$AGE" -gt "$SEVEN_DAYS" ]; then
              echo "Deleting release $ID created at $CREATED_AT"
              curl -s -X DELETE -H "Authorization: token $GITHUB_TOKEN" \
                "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/$ID"
            fi
          done