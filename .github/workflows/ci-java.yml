name: Carrier Guard CI/CD

on:
  push:
    branches:
      - "**"
  repository_dispatch:
    types: [frontend_push]

permissions:
  contents: write

jobs:
  # 1️⃣ Run Tests
  run-tests:
    runs-on: ubuntu-latest
    outputs:
      run-id: ${{ github.run_id }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Set Up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build Project & Run Tests
        run: |
          set -o pipefail
          mvn clean test -Dsurefire.suiteXmlFiles=testng.xml 2>&1 | tee mvn-output.log

      # Upload Maven output and Allure results temporarily for next job
      - name: Upload Maven Output
        uses: actions/upload-artifact@v4
        with:
          name: mvn-output
          path: mvn-output.log
          retention-days: 1

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          retention-days: 1

  # 2️⃣ Generate Allure Report
  generate-report:
    runs-on: ubuntu-latest
    needs: run-tests
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Install Allure CLI
        run: |
          ALLURE_VERSION=2.27.0
          wget -q https://github.com/allure-framework/allure2/releases/download/$ALLURE_VERSION/allure-$ALLURE_VERSION.tgz
          tar -zxvf allure-$ALLURE_VERSION.tgz -C /opt/
          echo "/opt/allure-$ALLURE_VERSION/bin" >> $GITHUB_PATH

      - name: Download Allure Results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Generate Single-File Allure Report
        run: |
          export PATH=/opt/allure-2.27.0/bin:$PATH
          if [ -d "allure-results" ]; then
            allure generate --clean allure-results -o allure-report.zip --single-file
          else
            mkdir -p empty-report
            echo "<html><body><h1>No tests executed</h1></body></html>" > empty-report/index.html
            zip -r allure-report.zip empty-report
          fi

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report.zip
          retention-days: 7

  # 3️⃣ Send Microsoft Teams Notification
  send-teams:
    runs-on: ubuntu-latest
    needs: [run-tests, generate-report]
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      # Download Maven output for summary counts
      - name: Download Maven Output
        uses: actions/download-artifact@v4
        with:
          name: mvn-output
          path: mvn-output.log

      - name: Parse Test Summary
        id: summary
        run: |
          TOTAL=0
          PASSED=0
          FAILED=0
          SKIPPED=0

          if [ -f mvn-output.log ]; then
            SUMMARY=$(grep "Tests run:" mvn-output.log | tail -n 1 || true)
            if [ -n "$SUMMARY" ]; then
              TOTAL=$(echo "$SUMMARY" | sed -n 's/.*Tests run: *\([0-9]*\).*/\1/p')
              FAIL=$(echo "$SUMMARY" | sed -n 's/.*Failures: *\([0-9]*\).*/\1/p')
              ERR=$(echo "$SUMMARY" | sed -n 's/.*Errors: *\([0-9]*\).*/\1/p')
              SKIPPED=$(echo "$SUMMARY" | sed -n 's/.*Skipped: *\([0-9]*\).*/\1/p')
              FAIL=${FAIL:-0}
              ERR=${ERR:-0}
              TOTAL=${TOTAL:-0}
              SKIPPED=${SKIPPED:-0}
              FAILED=$((FAIL + ERR))
              PASSED=$((TOTAL - FAILED - SKIPPED))
            fi
          fi

          echo "TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "PASSED=$PASSED" >> $GITHUB_ENV
          echo "FAILED=$FAILED" >> $GITHUB_ENV
          echo "SKIPPED=$SKIPPED" >> $GITHUB_ENV

      - name: Send Teams Notification
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          TOTAL=${TOTAL:-0}
          PASSED=${PASSED:-0}
          FAILED=${FAILED:-0}
          SKIPPED=${SKIPPED:-0}

          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${{ needs.run-tests.outputs['test-job-run-id'] || github.run_id }}"

          TEXT="**Carrier Guard CI/CD Test Results**\n\n**Total:** ${TOTAL}\n**Passed:** ${PASSED}\n**Failed:** ${FAILED}\n**Skipped:** ${SKIPPED}\n\n**Allure Report (7-day retention):** [View and Download](${RUN_URL})"

          JSON_PAYLOAD=$(printf '{"title":"Carrier Guard Automation","text":"%s"}' "${TEXT}")

          if [ -z "$TEAMS_WEBHOOK_URL" ]; then
            echo "TEAMS_WEBHOOK_URL not set, skipping notification"
            exit 0
          fi

          curl -H 'Content-Type: application/json' -d "$JSON_PAYLOAD" "$TEAMS_WEBHOOK_URL"