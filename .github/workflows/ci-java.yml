name: Carrier Guard CI/CD

on:
  push:
    branches:
      - "**"
  repository_dispatch:
    types: [frontend_push]

permissions:
  contents: write

env:
  TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}

jobs:

  # 1’ĖÅŌāŻ Checkout Source Code
  checkout:
    runs-on: ubuntu-latest
    outputs:
      repo_path: ${{ steps.checkout-step.outputs.repo_path }}
    steps:
      - name: Checkout Source Code
        id: checkout-step
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
        run: echo "repo_path=$(pwd)" >> $GITHUB_OUTPUT

  # 2’ĖÅŌāŻ Set Up Java 17
  setup-java:
    runs-on: ubuntu-latest
    needs: checkout
    steps:
      - name: Set Up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17
          cache: maven

  # 3’ĖÅŌāŻ Build Project & Run Tests
  build-test:
    runs-on: ubuntu-latest
    needs: setup-java
    outputs:
      total: ${{ steps.parse.outputs.total }}
      passed: ${{ steps.parse.outputs.passed }}
      failed: ${{ steps.parse.outputs.failed }}
      skipped: ${{ steps.parse.outputs.skipped }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Run Maven Tests
        run: |
          set -o pipefail
          mvn clean test -Dsurefire.suiteXmlFiles=testng.xml 2>&1 | tee mvn-output.log

      - name: Parse Test Summary
        id: parse
        run: |
          TOTAL=0
          FAILED=0
          SKIPPED=0
          PASSED=0

          if [ -f mvn-output.log ]; then
            SUMMARY=$(grep "Tests run:" mvn-output.log | tail -n 1 || true)
            if [ -n "$SUMMARY" ]; then
              TOTAL=$(echo "$SUMMARY" | sed -n 's/.*Tests run: *\([0-9]*\).*/\1/p')
              FAIL=$(echo "$SUMMARY" | sed -n 's/.*Failures: *\([0-9]*\).*/\1/p')
              ERR=$(echo "$SUMMARY" | sed -n 's/.*Errors: *\([0-9]*\).*/\1/p')
              SKIPPED=$(echo "$SUMMARY" | sed -n 's/.*Skipped: *\([0-9]*\).*/\1/p')
              FAIL=${FAIL:-0}
              ERR=${ERR:-0}
              TOTAL=${TOTAL:-0}
              SKIPPED=${SKIPPED:-0}
              FAILED=$((FAIL + ERR))
              PASSED=$((TOTAL - FAILED - SKIPPED))
            fi
          fi

          echo "::set-output name=total::$TOTAL"
          echo "::set-output name=passed::$PASSED"
          echo "::set-output name=failed::$FAILED"
          echo "::set-output name=skipped::$SKIPPED"

  # 4’ĖÅŌāŻ Install Allure CLI
  install-allure:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Install Allure CLI
        run: |
          ALLURE_VERSION=2.27.0
          wget -q https://github.com/allure-framework/allure2/releases/download/$ALLURE_VERSION/allure-$ALLURE_VERSION.tgz
          tar -zxvf allure-$ALLURE_VERSION.tgz -C /opt/
          echo "/opt/allure-$ALLURE_VERSION/bin" >> $GITHUB_PATH

  # 5’ĖÅŌāŻ Generate Allure Single-File Report
  generate-report:
    runs-on: ubuntu-latest
    needs: [build-test, install-allure]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Download Test Results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Generate Allure Report
        run: |
          export PATH=/opt/allure-2.27.0/bin:$PATH
          if [ -d "allure-results" ]; then
            allure generate --clean allure-results -o allure-report.zip --single-file
          else
            mkdir -p empty-report
            echo "<html><body><h1>No tests executed</h1></body></html>" > empty-report/index.html
            zip -r allure-report.zip empty-report
          fi

  # 6’ĖÅŌāŻ Upload Allure Report Artifact
  upload-artifact:
    runs-on: ubuntu-latest
    needs: generate-report
    steps:
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_id }}
          path: allure-report.zip
          retention-days: 7

  # 7’ĖÅŌāŻ (Optional) Any Extra Step
  extra-step:
    runs-on: ubuntu-latest
    needs: upload-artifact
    steps:
      - name: Placeholder
        run: echo "Extra step if needed"

  # 8’ĖÅŌāŻ Send Microsoft Teams Notification
  notify:
    runs-on: ubuntu-latest
    needs: upload-artifact
    steps:
      - name: Send Teams Notification
        run: |
          TOTAL=${{ needs.build-test.outputs.total }}
          PASSED=${{ needs.build-test.outputs.passed }}
          FAILED=${{ needs.build-test.outputs.failed }}
          SKIPPED=${{ needs.build-test.outputs.skipped }}

          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${{ github.run_id }}"

          TEXT="**Carrier Guard CI/CD Test Results**\n\n**Total:** ${TOTAL}\n**Passed:** ${PASSED}\n**Failed:** ${FAILED}\n**Skipped:** ${SKIPPED}\n\n**Allure Report (ZIP, 7-day retention):** [Download from GitHub Actions](${RUN_URL})"

          JSON_PAYLOAD=$(printf '{"title":"Carrier Guard Automation","text":"%s"}' "${TEXT}")

          curl -H 'Content-Type: application/json' -d "$JSON_PAYLOAD" "$TEAMS_WEBHOOK_URL"