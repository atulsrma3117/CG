name: Carrier Guard CI/CD

on:
  push:
    branches:
      - "**"
  repository_dispatch:
    types: [frontend_push]

permissions:
  contents: write

jobs:
  carrier-guard:
    runs-on: ubuntu-latest
    env:
      TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}

    steps:
      # 1️⃣ Checkout Source Code
      - name: Checkout Source Code
        uses: actions/checkout@v3

      # 2️⃣ Set Up Java 17
      - name: Set Up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # 3️⃣ Build Project & Run Tests (generate Allure results)
      - name: Build Project & Run Tests
        run: |
          set -o pipefail
          mvn clean test -Dsurefire.suiteXmlFiles=testng.xml 2>&1 | tee mvn-output.log

      # 4️⃣ Install Allure CLI
      - name: Install Allure CLI
        run: |
          ALLURE_VERSION=2.27.0
          wget -q https://github.com/allure-framework/allure2/releases/download/$ALLURE_VERSION/allure-$ALLURE_VERSION.tgz
          tar -zxvf allure-$ALLURE_VERSION.tgz -C /opt/
          echo "/opt/allure-$ALLURE_VERSION/bin" >> $GITHUB_PATH

      # 5️⃣ Generate Allure Report
      - name: Generate Allure Report
        run: |
          if [ -d "allure-results" ]; then
            allure generate allure-results --clean -o allure-report
          else
            mkdir -p allure-report
            echo "<html><body><h1>No tests executed</h1></body></html>" > allure-report/index.html
          fi

      # 6️⃣ Upload Allure Report as Artifact (unique per run, 30 days retention)
      - name: Upload Allure Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_id }}
          path: allure-report
          retention-days: 30

      # 7️⃣ Parse Test Summary from Maven output
      - name: Parse Test Summary
        id: results
        run: |
          TOTAL=0
          FAILED=0
          SKIPPED=0
          PASSED=0

          if [ -f mvn-output.log ]; then
            SUMMARY=$(grep "Tests run:" mvn-output.log | tail -n 1 || true)
            if [ -n "$SUMMARY" ]; then
              TOTAL=$(echo "$SUMMARY" | sed -n 's/.*Tests run: *\([0-9]*\).*/\1/p')
              FAIL=$(echo "$SUMMARY" | sed -n 's/.*Failures: *\([0-9]*\).*/\1/p')
              ERR=$(echo "$SUMMARY" | sed -n 's/.*Errors: *\([0-9]*\).*/\1/p')
              SKIPPED=$(echo "$SUMMARY" | sed -n 's/.*Skipped: *\([0-9]*\).*/\1/p')

              FAIL=${FAIL:-0}
              ERR=${ERR:-0}
              TOTAL=${TOTAL:-0}
              SKIPPED=${SKIPPED:-0}

              FAILED=$((FAIL + ERR))
              PASSED=$((TOTAL - FAILED - SKIPPED))
            fi
          fi

          echo "TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "PASSED=$PASSED" >> $GITHUB_ENV
          echo "FAILED=$FAILED" >> $GITHUB_ENV
          echo "SKIPPED=$SKIPPED" >> $GITHUB_ENV

      # 8️⃣ Send Microsoft Teams Notification (links to artifact)
      - name: Send Teams Notification
        if: always()
        run: |
          TOTAL=${TOTAL:-0}
          PASSED=${PASSED:-0}
          FAILED=${FAILED:-0}
          SKIPPED=${SKIPPED:-0}

          ARTIFACT_NAME="allure-report-${GITHUB_RUN_ID}"
          ARTIFACT_URL="https://github.com/${GITHUB_REPOSITORY}/suites/${GITHUB_RUN_ID}/artifacts"  # GitHub artifact link

          TEXT="**Carrier Guard CI/CD Test Results**\\n\\n**Total:** ${TOTAL}\\n**Passed:** ${PASSED}\\n**Failed:** ${FAILED}\\n**Skipped:** ${SKIPPED}\\n\\n**Allure Report (30-day retention):** [Download](${ARTIFACT_URL})"

          JSON_PAYLOAD=$(printf '{"title":"Carrier Guard Automation","text":"%s"}' "${TEXT}")

          if [ -z "$TEAMS_WEBHOOK_URL" ]; then
            echo "TEAMS_WEBHOOK_URL not set, skipping notification"
            exit 0
          fi

          echo "Sending Teams notification..."
          curl -H 'Content-Type: application/json' -d "$JSON_PAYLOAD" "$TEAMS_WEBHOOK_URL"