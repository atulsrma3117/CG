name: Carrier Guard CI/CD

on:
  push:
    branches:
      - "**"
  repository_dispatch:
    types: [frontend_push]

# Give the workflow explicit write permission so actions that push (gh-pages) can work
permissions:
  contents: write

jobs:
  Carrier_Guard:
    runs-on: ubuntu-latest
    env:
      TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Cache Maven packages
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # 3️⃣ Set up Java
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # 4️⃣ List test files for debugging
      - name: List test files
        run: ls -R src/test/java || true

      # 5️⃣ Build and run tests (with debug)
      - name: Build and run tests
        # Ensure Allure TestNG adapter writes to the repository-level "allure-results" directory
        run: |
          set -o pipefail
          mvn clean test -Dsurefire.suiteXmlFiles=testng.xml -Dallure.results.directory=allure-results | tee mvn-output.log
        continue-on-error: true

      # 5.1️⃣ List generated allure-results (if any) for debugging
      - name: List allure-results (if present)
        run: |
          echo "== allure-results contents =="
          if [ -d "allure-results" ]; then
            ls -la allure-results || true
            # show a few representative files for debugging
            head -n 200 allure-results/* 2>/dev/null || true
          else
            echo "no allure-results directory"
          fi

      # 6️⃣ List Surefire reports for debugging (if present)
      - name: List Surefire reports
        run: |
          echo "== surefire-reports contents =="
          if [ -d "target/surefire-reports" ]; then
            ls -la target/surefire-reports || true
            sed -n '1,200p' target/surefire-reports/*.xml || true
          else
            echo "no surefire reports found"
          fi

      # 7️⃣ (fallback) Copy Surefire results to allure-results only if there are no real allure-results
      - name: Copy Surefire results to allure-results (fallback)
        run: |
          if [ -d "allure-results" ] && [ "$(ls -A allure-results 2>/dev/null)" ]; then
            echo "allure-results already present, skipping copy of surefire reports"
          elif [ -d "target/surefire-reports" ] && [ "$(ls -A target/surefire-reports 2>/dev/null)" ]; then
            echo "No allure-results found; copying surefire XMLs into allure-results as a fallback"
            mkdir -p allure-results
            cp target/surefire-reports/*.xml allure-results/ || true
          else
            echo "No test report files found to copy"
          fi

      # 8️⃣ Install Allure CLI
      - name: Install Allure CLI
        run: |
          ALLURE_VERSION=2.27.0
          wget https://github.com/allure-framework/allure2/releases/download/$ALLURE_VERSION/allure-$ALLURE_VERSION.tgz
          tar -zxvf allure-$ALLURE_VERSION.tgz -C /opt/
          echo "/opt/allure-$ALLURE_VERSION/bin" >> $GITHUB_PATH

      # 9️⃣ Check Allure version
      - name: Check Allure version
        run: allure --version

      # 🔟 Generate Allure Report with verbose logging (prefer real allure-results)
      - name: Generate Allure Report (with verbose logging)
        run: |
          if [ -d "allure-results" ] && [ "$(ls -A allure-results 2>/dev/null)" ]; then
            echo "Generating Allure report from allure-results"
            allure generate allure-results --clean -o allure-report --verbose || true
            echo "== allure-report contents =="
            ls -la allure-report || true
          elif [ -d "target/surefire-reports" ] && [ "$(ls -A target/surefire-reports 2>/dev/null)" ]; then
            echo "No allure-results; attempting to generate from surefire reports copied into allure-results (best-effort)"
            mkdir -p allure-results
            cp target/surefire-reports/*.xml allure-results/ || true
            allure generate allure-results --clean -o allure-report --verbose || true
            ls -la allure-report || true
          else
            echo "No allure results or test reports found, creating placeholder report."
            mkdir -p allure-report
            echo "<html><body><h1>No tests executed</h1></body></html>" > allure-report/index.html
          fi

      # 1️⃣1️⃣ Upload Allure Report Artifact (for download)
      - name: Upload Allure Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Allure-Report
          path: allure-report

      # Upload ExtentReport artifact (if generated)
      - name: Upload Extent Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Extent-Report
          path: |
            test-output/*.html
            test-output/**/*.html

      # 1️⃣2️⃣ Push Allure Report to GitHub Pages (for viewing online)
      - name: Push Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          # prefer a PAT stored in secrets.AUTOMATION_REPO_TOKEN for write access
          github_token: ${{ secrets.AUTOMATION_REPO_TOKEN }}
          publish_dir: ./allure-report   # Path to the directory where the report is generated

      # 1️⃣3️⃣ Parse test results (safe defaults when reports are missing, fallback to Allure JSONs)
      - name: Parse test results
        id: results
        run: |
          set -x
          # Debug listing before parsing
          echo "-- DEBUG: listing target/surefire-reports --"
          ls -la target/surefire-reports || true
          echo "-- DEBUG: listing allure-results --"
          ls -la allure-results || true
          echo "-- DEBUG: show mvn-output.log head --"
          head -n 200 mvn-output.log || true

          # Default values
          TOTAL=0
          FAILED=0
          SKIPPED=0
          PASSED=0
          FAILED_TESTS="None"

          # Primary: parse Maven console summary from mvn-output.log (most reliable when files are missing)
          if [ -f mvn-output.log ]; then
            echo "Parsing test summary from mvn-output.log (primary)"
            # show all matching lines for debugging
            echo "-- ALL lines matching 'Tests run:' --"
            grep -n "Tests run:" mvn-output.log || true
            SUMMARY_LINE=$(grep "Tests run:" mvn-output.log | tail -n 1 || true)
            echo "Found summary line: $SUMMARY_LINE"
            if [ -n "$SUMMARY_LINE" ]; then
              # Robust extraction using awk: split by comma and strip non-digits
              TR=$(echo "$SUMMARY_LINE" | awk -F',' '{gsub(/[^0-9]/,"",$1); print $1}')
              FAIL=$(echo "$SUMMARY_LINE" | awk -F',' '{gsub(/[^0-9]/,"",$2); print $2}')
              ERR=$(echo "$SUMMARY_LINE" | awk -F',' '{gsub(/[^0-9]/,"",$3); print $3}')
              SKIP=$(echo "$SUMMARY_LINE" | awk -F',' '{gsub(/[^0-9]/,"",$4); print $4}')

              echo "EXTRACTED -> TR='$TR' FAIL='$FAIL' ERR='$ERR' SKIP='$SKIP'"

              TOTAL=${TR:-0}
              ERR=${ERR:-0}
              FAILED=$(( (FAIL:-0) + (ERR:-0) ))
              SKIPPED=${SKIP:-0}
              PASSED=$((TOTAL - FAILED - SKIPPED))
              echo "Parsed from mvn-output -> TOTAL=$TOTAL, FAIL=$FAIL, ERR=$ERR, SKIPPED=$SKIPPED, PASSED=$PASSED"
            else
              echo "No summary line present in mvn-output.log"
            fi

          # Secondary: parse Surefire XMLs if present
          elif ls target/surefire-reports/*.xml 1> /dev/null 2>&1; then
            echo "Parsing surefire XMLs..."
            # show which files and sample
            echo "Found files: "
            ls -la target/surefire-reports/*.xml || true
            sed -n '1,120p' target/surefire-reports/*.xml | sed -n '1,200p' || true

            # Sum attributes from testsuite elements: tests, failures, errors, skipped
            TOTAL_RAW=$(grep -rho "tests=\"[0-9]\+\"" target/surefire-reports | sed 's/[^0-9]//g' | awk '{s+=$1} END {print s+0}')
            FAILED_RAW=$(grep -rho "failures=\"[0-9]\+\"" target/surefire-reports | sed 's/[^0-9]//g' | awk '{s+=$1} END {print s+0}')
            ERR_RAW=$(grep -rho "errors=\"[0-9]\+\"" target/surefire-reports | sed 's/[^0-9]//g' | awk '{s+=$1} END {print s+0}')
            SKIPPED_RAW=$(grep -rho "skipped=\"[0-9]\+\"" target/surefire-reports | sed 's/[^0-9]//g' | awk '{s+=$1} END {print s+0}')

            echo "attribute counts -> TOTAL_RAW=$TOTAL_RAW, FAILED_RAW=$FAILED_RAW, ERR_RAW=$ERR_RAW, SKIPPED_RAW=$SKIPPED_RAW"

            TOTAL=$(echo "$TOTAL_RAW" | awk '{print $1+0}')
            FAILED=$(( ( $(echo "$FAILED_RAW" | awk '{print $1+0}') ) + ( $(echo "$ERR_RAW" | awk '{print $1+0}') ) ))
            SKIPPED=$(echo "$SKIPPED_RAW" | awk '{print $1+0}')
            PASSED=$((TOTAL - FAILED - SKIPPED))

            # Get failed test names if failures present
            if [ "$FAILED" -gt 0 ]; then
              FAILED_TESTS=$(grep -rho "<testcase" target/surefire-reports/*.xml 2>/dev/null | grep "<failure" -n || true)
              FAILED_TESTS=$(echo "$FAILED_TESTS" | sed -n '1,200p' | tr '\n' ', ' || echo "None")
            fi

          # Tertiary: parse Allure JSON results (best-effort)
          elif ls allure-results/*.json 1> /dev/null 2>&1; then
            echo "No mvn summary or surefire XMLs; parsing allure-results JSON files for statuses"
            # Count status occurrences in JSON result files
            FAILED=$(grep -rho "\"status\"\s*:\s*\"failed\"" allure-results | wc -l | tr -d ' ')
            PASSED=$(grep -rho "\"status\"\s*:\s*\"passed\"" allure-results | wc -l | tr -d ' ')
            SKIPPED=$(grep -rho "\"status\"\s*:\s*\"skipped\"" allure-results | wc -l | tr -d ' ')
            TOTAL=$((FAILED + PASSED + SKIPPED))
            # Attempt to get failed test names
            FAILED_TESTS=$(grep -rho "\"status\"\s*:\s*\"failed\".*\"name\"\s*:\s*\"[^\"]\+\"" allure-results | sed -E 's/.*\"name\"\s*:\s*\"([^\"]*)\".*/\1/' | tr '\n' ', ' || echo "None")

          else
            echo "No test report files found in mvn-output.log, surefire, or allure-results"
          fi

          echo "FINAL COUNTS -> TOTAL=$TOTAL, PASSED=$PASSED, FAILED=$FAILED, SKIPPED=$SKIPPED, FAILED_TESTS=$FAILED_TESTS"

          # write to a temp env file for visibility and robustness
          SUMMARY_FILE=/tmp/test-summary.env
          printf "TOTAL=%s\n" "$TOTAL" > $SUMMARY_FILE
          printf "PASSED=%s\n" "$PASSED" >> $SUMMARY_FILE
          printf "FAILED=%s\n" "$FAILED" >> $SUMMARY_FILE
          printf "SKIPPED=%s\n" "$SKIPPED" >> $SUMMARY_FILE
          printf "FAILED_TESTS=%s\n" "$FAILED_TESTS" >> $SUMMARY_FILE

          echo "-- DEBUG: test-summary.env content --"
          cat $SUMMARY_FILE || true

          # append to GITHUB_ENV so following steps can read
          cat $SUMMARY_FILE >> $GITHUB_ENV || true

          # debug: show persisted GITHUB_ENV entries
          echo "-- DEBUG: persisted GITHUB_ENV (last 50 lines) --"
          tail -n 50 $GITHUB_ENV || true

          # expose an extent report path if present
          if ls test-output/*.html 1> /dev/null 2>&1; then
            EXTENT_PATH=$(ls test-output/*.html | head -n1)
            echo "EXTENT_REPORT=$EXTENT_PATH" >> $GITHUB_ENV
          else
            echo "EXTENT_REPORT=None" >> $GITHUB_ENV
          fi

      # 1️⃣4️⃣ Send Teams Notification (always runs, even on failure)
      - name: Send Teams Notification
        if: always()
        run: |
          # Ensure variables written to GITHUB_ENV in previous step are loaded into this shell
          if [ -f "$GITHUB_ENV" ]; then
            echo "Sourcing GITHUB_ENV: $GITHUB_ENV"
            # shell portability: use set -a to export variables from file
            set -o allexport
            source "$GITHUB_ENV"
            set +o allexport
          fi
          # Also source the explicit summary file if present
          if [ -f /tmp/test-summary.env ]; then
            echo "Sourcing /tmp/test-summary.env"
            set -o allexport
            source /tmp/test-summary.env
            set +o allexport
          fi

          # Debug: show environment variables that will be sent (non-secret)
          echo "-- DEBUG ENV VARS (non-secret) --"
          echo "TOTAL=$TOTAL"
          echo "PASSED=$PASSED"
          echo "FAILED=$FAILED"
          echo "SKIPPED=$SKIPPED"
          echo "FAILED_TESTS=$FAILED_TESTS"
          echo "-- mvn-output.log tail --"
          tail -n 50 mvn-output.log || true

          # Build JSON payload using printf to avoid heredoc/indentation issues
          TOTAL=${TOTAL:-0}
          PASSED=${PASSED:-0}
          FAILED=${FAILED:-0}
          SKIPPED=${SKIPPED:-0}
          FAILED_TESTS=${FAILED_TESTS:-None}
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          # include Extent report link when available
          EXTENT_REPORT=${EXTENT_REPORT:-None}
          if [ "$EXTENT_REPORT" != "None" ]; then
            EXTENT_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/-/suites/${GITHUB_RUN_ID}/artifacts" # best-effort link to artifacts page
            # Add Extent link text to the message
            payload=$(printf '{"title":"CI/CD Test Results","text":"**Total:** %s\n**Passed:** %s\n**Failed:** %s\n**Skipped:** %s\n**Failed Tests:** %s\n**Allure Report:** [Download Allure Report](%s)\n**Extent Report (artifact):** [Download Extent Report](%s)"}' \
              "$TOTAL" "$PASSED" "$FAILED" "$SKIPPED" "$FAILED_TESTS" "$RUN_URL" "$EXTENT_URL")
          else
            payload=$(printf '{"title":"CI/CD Test Results","text":"**Total:** %s\n**Passed:** %s\n**Failed:** %s\n**Skipped:** %s\n**Failed Tests:** %s\n**Allure Report:** [Download Allure Report](%s)"}' \
              "$TOTAL" "$PASSED" "$FAILED" "$SKIPPED" "$FAILED_TESTS" "$RUN_URL")
          fi

          if [ -z "$TEAMS_WEBHOOK_URL" ]; then
            echo "TEAMS_WEBHOOK_URL not set, skipping notification"
            exit 0
          fi

          echo "Sending Teams notification: Total=$TOTAL, Passed=$PASSED, Failed=$FAILED, Skipped=$SKIPPED"
          curl -H 'Content-Type: application/json' -d "$payload" "$TEAMS_WEBHOOK_URL"
