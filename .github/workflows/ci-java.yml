name: Carrier Guard CI/CD

on:
  push:
    branches:
      - "**"
  repository_dispatch:
    types: [frontend_push]

permissions:
  contents: write

jobs:
  carrier-guard:
    runs-on: ubuntu-latest
    env:
      TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}

    steps:

      # 1️⃣ Checkout Source Code
      - name: Checkout Source Code
        uses: actions/checkout@v3

      # 2️⃣ Set Up Java 17
      - name: Set Up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # 3️⃣ Build Project & Run Tests
      - name: Build Project & Run Tests
        run: |
          set -o pipefail
          mvn clean test -Dsurefire.suiteXmlFiles=testng.xml

      # 4️⃣ Install Allure CLI
      - name: Install Allure CLI
        run: |
          ALLURE_VERSION=2.27.0
          wget -q https://github.com/allure-framework/allure2/releases/download/$ALLURE_VERSION/allure-$ALLURE_VERSION.tgz
          tar -zxvf allure-$ALLURE_VERSION.tgz -C /opt/
          echo "/opt/allure-$ALLURE_VERSION/bin" >> $GITHUB_PATH

      # 5️⃣ Generate Allure Report
      - name: Generate Allure Report
        run: |
          if [ -d "allure-results" ]; then
            allure generate allure-results --clean -o allure-report
          else
            mkdir -p allure-report
            echo "<html><body><h1>No tests executed</h1></body></html>" > allure-report/index.html
          fi

      # 6️⃣ Publish Allure Report (Unique Folder Per Run)
      - name: Publish Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.AUTOMATION_REPO_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          destination_dir: ${{ github.run_id }}

      # 7️⃣ Cleanup Reports Older Than 30 Days
      - name: Cleanup Old Reports (30 Days Retention)
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git clone --depth=1 --branch gh-pages \
            https://x-access-token:${{ secrets.AUTOMATION_REPO_TOKEN }}@github.com/${{ github.repository }}.git gh-pages

          cd gh-pages

          CURRENT_TIME=$(date +%s)
          THIRTY_DAYS=$((30*24*60*60))

          for dir in */ ; do
            if [ -d "$dir" ]; then
              LAST_COMMIT_TIME=$(git log -1 --format="%ct" -- "$dir" || echo 0)
              AGE=$((CURRENT_TIME - LAST_COMMIT_TIME))

              if [ "$AGE" -gt "$THIRTY_DAYS" ]; then
                echo "Deleting old report folder: $dir"
                rm -rf "$dir"
              fi
            fi
          done

          git add .
          git commit -m "Cleanup reports older than 30 days" || echo "No old reports to delete"
          git push

      # 8️⃣ Parse Test Summary
      - name: Parse Test Summary
        run: |
          TOTAL=0
          FAILED=0
          SKIPPED=0
          PASSED=0

          if [ -f mvn-output.log ]; then
            SUMMARY=$(grep "Tests run:" mvn-output.log | tail -n 1 || true)
            if [ -n "$SUMMARY" ]; then
              TOTAL=$(echo "$SUMMARY" | sed -n 's/.*Tests run: *\([0-9]*\).*/\1/p')
              FAIL=$(echo "$SUMMARY" | sed -n 's/.*Failures: *\([0-9]*\).*/\1/p')
              ERR=$(echo "$SUMMARY" | sed -n 's/.*Errors: *\([0-9]*\).*/\1/p')
              SKIPPED=$(echo "$SUMMARY" | sed -n 's/.*Skipped: *\([0-9]*\).*/\1/p')

              FAIL=${FAIL:-0}
              ERR=${ERR:-0}
              TOTAL=${TOTAL:-0}
              SKIPPED=${SKIPPED:-0}

              FAILED=$((FAIL + ERR))
              PASSED=$((TOTAL - FAILED - SKIPPED))
            fi
          fi

          echo "TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "PASSED=$PASSED" >> $GITHUB_ENV
          echo "FAILED=$FAILED" >> $GITHUB_ENV
          echo "SKIPPED=$SKIPPED" >> $GITHUB_ENV

      # 9️⃣ Send Microsoft Teams Notification
      - name: Send Microsoft Teams Notification
        if: always()
        run: |
          TOTAL=${TOTAL:-0}
          PASSED=${PASSED:-0}
          FAILED=${FAILED:-0}
          SKIPPED=${SKIPPED:-0}

          PAGES_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}/${GITHUB_RUN_ID}/"

          TEXT="**CI/CD Test Results**\\n\\n**Total:** ${TOTAL}\\n**Passed:** ${PASSED}\\n**Failed:** ${FAILED}\\n**Skipped:** ${SKIPPED}\\n\\n**Allure Report (Available 30 Days):** [View Report](${PAGES_URL})"

          JSON_PAYLOAD=$(printf '{"title":"Carrier Guard Automation","text":"%s"}' "${TEXT}")

          if [ -z "$TEAMS_WEBHOOK_URL" ]; then
            echo "TEAMS_WEBHOOK_URL not set"
            exit 0
          fi

          curl -H 'Content-Type: application/json' \
               -d "$JSON_PAYLOAD" \
               "$TEAMS_WEBHOOK_URL"