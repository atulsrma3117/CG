name: Carrier Guard CI/CD

on:
  push:
    branches:
      - "**"
  repository_dispatch:
    types: [frontend_push]

permissions:
  contents: write

jobs:
  # 1️⃣ Checkout & Setup Java
  setup-java:
    runs-on: ubuntu-latest
    outputs:
      java-path: ${{ steps.java-path.outputs.path }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set Up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Output Java Path
        id: java-path
        run: echo "path=$JAVA_HOME" >> $GITHUB_OUTPUT

  # 2️⃣ Run Tests & Upload Maven Output + allure-results
  run-tests:
    runs-on: ubuntu-latest
    needs: setup-java
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build & Test
        run: |
          set -o pipefail
          mvn clean test -Dsurefire.suiteXmlFiles=testng.xml 2>&1 | tee mvn-output.log

      - name: Upload Maven Output
        uses: actions/upload-artifact@v4
        with:
          name: mvn-output-${{ github.run_id }}
          path: mvn-output.log
          retention-days: 7

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_id }}
          path: allure-results
          retention-days: 7

  # 3️⃣ Install Allure CLI
  install-allure:
    runs-on: ubuntu-latest
    needs: run-tests
    steps:
      - name: Install Allure CLI
        run: |
          ALLURE_VERSION=2.27.0
          wget -q https://github.com/allure-framework/allure2/releases/download/$ALLURE_VERSION/allure-$ALLURE_VERSION.tgz
          tar -zxvf allure-$ALLURE_VERSION.tgz -C /opt/
          echo "/opt/allure-$ALLURE_VERSION/bin" >> $GITHUB_PATH
          export PATH=/opt/allure-$ALLURE_VERSION/bin:$PATH
          allure --version

  # 4️⃣ Generate Single-File Allure Report
  generate-report:
    runs-on: ubuntu-latest
    needs: [run-tests, install-allure]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Download Allure Results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-${{ github.run_id }}
          path: allure-results

      - name: Generate Allure Report
        run: |
          export PATH=/opt/allure-2.27.0/bin:$PATH
          if [ -d "allure-results" ]; then
            allure generate --clean allure-results -o allure-report.zip --single-file
          else
            mkdir -p empty-report
            echo "<html><body><h1>No tests executed</h1></body></html>" > empty-report/index.html
            zip -r allure-report.zip empty-report
          fi

      - name: Upload Allure Artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_id }}
          path: allure-report.zip
          retention-days: 7

  # 5️⃣ Parse Test Summary
  parse-summary:
    runs-on: ubuntu-latest
    needs: run-tests
    outputs:
      total: ${{ steps.summary.outputs.total }}
      passed: ${{ steps.summary.outputs.passed }}
      failed: ${{ steps.summary.outputs.failed }}
      skipped: ${{ steps.summary.outputs.skipped }}
    steps:
      - name: Download Maven Output
        uses: actions/download-artifact@v4
        with:
          name: mvn-output-${{ github.run_id }}
          path: mvn-output.log

      - id: summary
        run: |
          TOTAL=0
          FAILED=0
          SKIPPED=0
          PASSED=0

          if [ -f mvn-output.log ]; then
            SUMMARY=$(grep "Tests run:" mvn-output.log | tail -n 1 || true)
            if [ -n "$SUMMARY" ]; then
              TOTAL=$(echo "$SUMMARY" | sed -n 's/.*Tests run: *\([0-9]*\).*/\1/p')
              FAIL=$(echo "$SUMMARY" | sed -n 's/.*Failures: *\([0-9]*\).*/\1/p')
              ERR=$(echo "$SUMMARY" | sed -n 's/.*Errors: *\([0-9]*\).*/\1/p')
              SKIPPED=$(echo "$SUMMARY" | sed -n 's/.*Skipped: *\([0-9]*\).*/\1/p')

              FAIL=${FAIL:-0}
              ERR=${ERR:-0}
              TOTAL=${TOTAL:-0}
              SKIPPED=${SKIPPED:-0}

              FAILED=$((FAIL + ERR))
              PASSED=$((TOTAL - FAILED - SKIPPED))
            fi
          fi

          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT

  # 6️⃣ Send Microsoft Teams Notification
  send-teams:
    runs-on: ubuntu-latest
    needs: [generate-report, parse-summary]
    steps:
      - name: Send Teams Notification
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          TOTAL=${{ needs.parse-summary.outputs.total }}
          PASSED=${{ needs.parse-summary.outputs.passed }}
          FAILED=${{ needs.parse-summary.outputs.failed }}
          SKIPPED=${{ needs.parse-summary.outputs.skipped }}

          # GitHub Actions run link (artifact downloadable for 7 days)
          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          TEXT="**Carrier Guard CI/CD Test Results**\n\n**Total:** ${TOTAL}\n**Passed:** ${PASSED}\n**Failed:** ${FAILED}\n**Skipped:** ${SKIPPED}\n\n**Allure Report (ZIP, 7-day retention):** [Download](${RUN_URL})"

          JSON_PAYLOAD=$(printf '{"title":"Carrier Guard Automation","text":"%s"}' "${TEXT}")

          if [ -z "$TEAMS_WEBHOOK_URL" ]; then
            echo "TEAMS_WEBHOOK_URL not set, skipping notification"
            exit 0
          fi

          curl -H 'Content-Type: application/json' -d "$JSON_PAYLOAD" "$TEAMS_WEBHOOK_URL"