name: Carrier Guard CI/CD

on:
  push:
    branches:
      - "**"
  repository_dispatch:
    types: [frontend_push]

permissions:
  contents: write

env:
  TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}

jobs:

  # 1️⃣ Build & Run Tests
  build-test:
    runs-on: ubuntu-latest
    outputs:
      total: ${{ steps.parse.outputs.total }}
      passed: ${{ steps.parse.outputs.passed }}
      failed: ${{ steps.parse.outputs.failed }}
      skipped: ${{ steps.parse.outputs.skipped }}
      run_id: ${{ github.run_id }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Set Up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build Project & Run Tests
        run: |
          set -o pipefail
          mvn clean test -Dsurefire.suiteXmlFiles=testng.xml 2>&1 | tee mvn-output.log

      - name: Parse Test Summary
        id: parse
        run: |
          TOTAL=0
          FAILED=0
          SKIPPED=0
          PASSED=0
          if [ -f mvn-output.log ]; then
            SUMMARY=$(grep "Tests run:" mvn-output.log | tail -n 1 || true)
            if [ -n "$SUMMARY" ]; then
              TOTAL=$(echo "$SUMMARY" | sed -n 's/.*Tests run: *\([0-9]*\).*/\1/p')
              FAIL=$(echo "$SUMMARY" | sed -n 's/.*Failures: *\([0-9]*\).*/\1/p')
              ERR=$(echo "$SUMMARY" | sed -n 's/.*Errors: *\([0-9]*\).*/\1/p')
              SKIPPED=$(echo "$SUMMARY" | sed -n 's/.*Skipped: *\([0-9]*\).*/\1/p')
              FAIL=${FAIL:-0}
              ERR=${ERR:-0}
              SKIPPED=${SKIPPED:-0}
              TOTAL=${TOTAL:-0}
              FAILED=$((FAIL + ERR))
              PASSED=$((TOTAL - FAILED - SKIPPED))
            fi
          fi
          echo "::set-output name=total::$TOTAL"
          echo "::set-output name=passed::$PASSED"
          echo "::set-output name=failed::$FAILED"
          echo "::set-output name=skipped::$SKIPPED"

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_id }}
          path: allure-results
          retention-days: 7

  # 2️⃣ Generate Allure Report
  generate-report:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Download Allure Results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-${{ needs.build-test.run_id }}
          path: allure-results

      - name: Install Allure CLI
        run: |
          ALLURE_VERSION=2.27.0
          wget -q https://github.com/allure-framework/allure2/releases/download/$ALLURE_VERSION/allure-$ALLURE_VERSION.tgz
          tar -zxvf allure-$ALLURE_VERSION.tgz -C /opt/
          echo "/opt/allure-$ALLURE_VERSION/bin" >> $GITHUB_PATH

      - name: Generate Single-File Allure Report
        run: |
          if [ -d "allure-results" ]; then
            allure generate --clean allure-results -o allure-report.zip --single-file
          else
            echo "No allure-results found, creating empty report"
            mkdir -p empty-report
            echo "<html><body><h1>No tests executed</h1></body></html>" > empty-report/index.html
            zip -r allure-report.zip empty-report
          fi

      - name: Upload Allure Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ needs.build-test.run_id }}
          path: allure-report.zip
          retention-days: 7

  # 3️⃣ Send Teams Notification
  notify-teams:
    runs-on: ubuntu-latest
    needs: generate-report
    steps:
      - name: Send Microsoft Teams Notification
        run: |
          TOTAL=${{ needs.build-test.total }}
          PASSED=${{ needs.build-test.passed }}
          FAILED=${{ needs.build-test.failed }}
          SKIPPED=${{ needs.build-test.skipped }}
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ needs.build-test.run_id }}"

          TEXT="**Carrier Guard CI/CD Test Results**\n\n**Total:** ${TOTAL}\n**Passed:** ${PASSED}\n**Failed:** ${FAILED}\n**Skipped:** ${SKIPPED}\n\n**Allure Report (ZIP, 7-day retention):** [Download here](${RUN_URL})"

          JSON_PAYLOAD=$(printf '{"title":"Carrier Guard Automation","text":"%s"}' "${TEXT}")

          if [ -z "$TEAMS_WEBHOOK_URL" ]; then
            echo "TEAMS_WEBHOOK_URL not set, skipping notification"
            exit 0
          fi

          curl -H 'Content-Type: application/json' -d "$JSON_PAYLOAD" "$TEAMS_WEBHOOK_URL"