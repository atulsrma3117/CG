name: Carrier Guard CI/CD

on:
  push:
    branches:
      - "**"
  repository_dispatch:
    types: [frontend_push]

permissions:
  contents: write

env:
  TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}

jobs:

  checkout:
    name: Checkout Source Code
    runs-on: ubuntu-latest
    outputs:
      repo_path: ${{ steps.set-path.outputs.repo_path }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set repo_path output
        id: set-path
        run: echo "repo_path=$(pwd)" >> $GITHUB_OUTPUT

  setup-java:
    name: Setup Java 17
    runs-on: ubuntu-latest
    needs: checkout
    steps:
      - name: Set Up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17
          cache: maven

  run-tests:
    name: Build Project & Run Tests
    runs-on: ubuntu-latest
    needs: setup-java
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Run Tests
        run: |
          set -o pipefail
          mvn clean test -Dsurefire.suiteXmlFiles=testng.xml 2>&1 | tee mvn-output.log

      - name: Upload Maven Output Log
        uses: actions/upload-artifact@v4
        with:
          name: mvn-output-log-${{ github.run_id }}
          path: mvn-output.log
          retention-days: 7

  install-allure:
    name: Install Allure CLI
    runs-on: ubuntu-latest
    needs: run-tests
    steps:
      - name: Install Allure CLI
        run: |
          ALLURE_VERSION=2.27.0
          wget -q https://github.com/allure-framework/allure2/releases/download/$ALLURE_VERSION/allure-$ALLURE_VERSION.tgz
          tar -zxvf allure-$ALLURE_VERSION.tgz -C /opt/
          echo "/opt/allure-$ALLURE_VERSION/bin" >> $GITHUB_PATH

  generate-report:
    name: Generate Single-File Allure Report
    runs-on: ubuntu-latest
    needs: install-allure
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Generate Report
        run: |
          export PATH=/opt/allure-2.27.0/bin:$PATH
          if [ -d "allure-results" ]; then
            allure generate --clean allure-results -o allure-report.zip --single-file
          else
            echo "No allure-results found, creating empty report"
            mkdir -p empty-report
            echo "<html><body><h1>No tests executed</h1></body></html>" > empty-report/index.html
            zip -r allure-report.zip empty-report

      - name: Upload Allure Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_id }}
          path: allure-report.zip
          retention-days: 7

  parse-summary:
    name: Parse Test Summary
    runs-on: ubuntu-latest
    needs: run-tests
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Parse Summary
        id: results
        run: |
          TOTAL=0
          FAILED=0
          SKIPPED=0
          PASSED=0

          if [ -f mvn-output.log ]; then
            SUMMARY=$(grep "Tests run:" mvn-output.log | tail -n 1 || true)
            if [ -n "$SUMMARY" ]; then
              TOTAL=$(echo "$SUMMARY" | sed -n 's/.*Tests run: *\([0-9]*\).*/\1/p')
              FAIL=$(echo "$SUMMARY" | sed -n 's/.*Failures: *\([0-9]*\).*/\1/p')
              ERR=$(echo "$SUMMARY" | sed -n 's/.*Errors: *\([0-9]*\).*/\1/p')
              SKIPPED=$(echo "$SUMMARY" | sed -n 's/.*Skipped: *\([0-9]*\).*/\1/p')

              FAIL=${FAIL:-0}
              ERR=${ERR:-0}
              TOTAL=${TOTAL:-0}
              SKIPPED=${SKIPPED:-0}

              FAILED=$((FAIL + ERR))
              PASSED=$((TOTAL - FAILED - SKIPPED))
            fi
          fi

          echo "TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "PASSED=$PASSED" >> $GITHUB_ENV
          echo "FAILED=$FAILED" >> $GITHUB_ENV
          echo "SKIPPED=$SKIPPED" >> $GITHUB_ENV

  send-teams:
    name: Send Teams Notification
    runs-on: ubuntu-latest
    needs: [parse-summary, generate-report]
    steps:
      - name: Send Notification
        run: |
          TOTAL=${TOTAL:-0}
          PASSED=${PASSED:-0}
          FAILED=${FAILED:-0}
          SKIPPED=${SKIPPED:-0}

          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          TEXT="**Carrier Guard CI/CD Test Results**\n\n**Total:** ${TOTAL}\n**Passed:** ${PASSED}\n**Failed:** ${FAILED}\n**Skipped:** ${SKIPPED}\n\n**Allure Report (ZIP, 7-day retention):** [Download](${RUN_URL})"

          JSON_PAYLOAD=$(printf '{"title":"Carrier Guard Automation","text":"%s"}' "${TEXT}")

          if [ -z "$TEAMS_WEBHOOK_URL" ]; then
            echo "TEAMS_WEBHOOK_URL not set, skipping notification"
            exit 0
          fi

          echo "Sending Teams notification..."
          curl -H 'Content-Type: application/json' -d "$JSON_PAYLOAD" "$TEAMS_WEBHOOK_URL"