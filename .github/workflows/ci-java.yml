name: Carrier Guard CI/CD

on:
  push:
    branches:
      - "**"
  repository_dispatch:
    types: [frontend_push]

permissions:
  contents: write

jobs:

  # 1️⃣ Run Tests
  run-tests:
    runs-on: ubuntu-latest
    outputs:
      total: ${{ steps.parse.outputs.total }}
      passed: ${{ steps.parse.outputs.passed }}
      failed: ${{ steps.parse.outputs.failed }}
      skipped: ${{ steps.parse.outputs.skipped }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Set Up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build Project & Run Tests
        run: |
          set -o pipefail
          mvn clean test -Dsurefire.suiteXmlFiles=testng.xml 2>&1 | tee mvn-output.log

      - name: Parse Test Summary
        id: parse
        run: |
          TOTAL=0
          PASSED=0
          FAILED=0
          SKIPPED=0

          if [ -f mvn-output.log ]; then
            # Take the last line containing summary
            SUMMARY=$(grep "Tests run:" mvn-output.log | tail -n 1 || true)
            if [ -n "$SUMMARY" ]; then
              TOTAL=$(echo "$SUMMARY" | grep -oP 'Tests run:\s*\K[0-9]+')
              FAIL=$(echo "$SUMMARY" | grep -oP 'Failures:\s*\K[0-9]+')
              ERR=$(echo "$SUMMARY" | grep -oP 'Errors:\s*\K[0-9]+')
              SKIPPED=$(echo "$SUMMARY" | grep -oP 'Skipped:\s*\K[0-9]+')

              # Default to 0 if any value is missing
              TOTAL=${TOTAL:-0}
              FAIL=${FAIL:-0}
              ERR=${ERR:-0}
              SKIPPED=${SKIPPED:-0}

              FAILED=$((FAIL + ERR))
              PASSED=$((TOTAL - FAILED - SKIPPED))
            fi
          fi

          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT

      - name: Upload Allure Results Artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          retention-days: 7

  # 2️⃣ Generate Allure Report
  generate-report:
    runs-on: ubuntu-latest
    needs: run-tests
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Restore Allure CLI from Cache
        uses: actions/cache@v3
        id: allure-cache
        with:
          path: /opt/allure-2.27.0
          key: allure-2.27.0

      - name: Install Allure CLI if not cached
        if: steps.allure-cache.outputs.cache-hit != 'true'
        run: |
          ALLURE_VERSION=2.27.0
          wget -q https://github.com/allure-framework/allure2/releases/download/$ALLURE_VERSION/allure-$ALLURE_VERSION.tgz
          tar -zxvf allure-$ALLURE_VERSION.tgz -C /opt/
          echo "/opt/allure-$ALLURE_VERSION/bin" >> $GITHUB_PATH

      - name: Download Allure Results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Generate Allure Report
        run: |
          export PATH=/opt/allure-2.27.0/bin:$PATH
          
           # Clean old files if any
          rm -rf allure-report allure-report.zip allure-report.html

          if [ -d "allure-results" ] && [ "$(ls -A allure-results)" ]; then
            echo "Generating Allure single HTML report..."

            # Generate as single HTML file
            allure generate allure-results --clean --single-file -o .

            # The file will be index.html → rename it
            mv index.html allure-report.html

            # Zip only the single html file
            zip allure-report.zip allure-report.html
          else
            echo "No results found, creating empty report..."
            echo "<html><body><h1>No tests executed</h1></body></html>" > allure-report.html
            zip allure-report.zip allure-report.html
          fi

      - name: Upload Allure Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report.zip
          retention-days: 7

  # 3️⃣ Send Microsoft Teams Notification
  send-teams:
    runs-on: ubuntu-latest
    needs:
      - run-tests
      - generate-report
    steps:
      - name: Send Teams Notification
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          TOTAL=${{ needs.run-tests.outputs.total }}
          PASSED=${{ needs.run-tests.outputs.passed }}
          FAILED=${{ needs.run-tests.outputs.failed }}
          SKIPPED=${{ needs.run-tests.outputs.skipped }}

          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          TEXT="**Carrier Guard CI/CD Test Results**\n\n**Total:** ${TOTAL}\n**Passed:** ${PASSED}\n**Failed:** ${FAILED}\n**Skipped:** ${SKIPPED}\n\n**Allure Report (7-day retention):** [View and Download](${RUN_URL})"

          JSON_PAYLOAD=$(printf '{"title":"Carrier Guard Automation","text":"%s"}' "${TEXT}")

          if [ -z "$TEAMS_WEBHOOK_URL" ]; then
            echo "TEAMS_WEBHOOK_URL not set, skipping notification"
            exit 0
          fi

          echo "Sending Teams notification..."
          curl -H 'Content-Type: application/json' -d "$JSON_PAYLOAD" "$TEAMS_WEBHOOK_URL"